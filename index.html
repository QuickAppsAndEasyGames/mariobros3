<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NES Emulator - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/nostalgist"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; touch-action: none; overflow: hidden; font-family: system-ui, sans-serif; }
        #game-screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { max-width: 100%; max-height: 70%; object-fit: contain; image-rendering: pixelated; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .controller { width: 100%; max-width: 500px; padding: 20px; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); user-select: none; }
        .btn-retro { background: #262626; border: 2px solid #404040; border-radius: 12px; display: flex; align-items: center; justify-content: center; active: scale(0.95); transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn-retro:active { background: #525252; border-color: #737373; }
        .dpad-grid { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 4px; }
        .action-btns { display: flex; gap: 15px; }
        .btn-round { width: 70px; height: 70px; border-radius: 50%; font-weight: bold; font-size: 20px; box-shadow: 0 4px 0 #171717; }
        .btn-sys { width: 60px; height: 25px; border-radius: 20px; font-size: 9px; text-transform: uppercase; font-weight: bold; background: #171717; }
    </style>
</head>
<body>

    <div id="game-screen">
        <div id="loading-text" class="mb-4 text-zinc-500 animate-pulse">Iniciando emulador...</div>
        <div id="emulator-container" class="w-full flex justify-center"></div>

        <div class="controller flex justify-between items-end pb-10">
            <div class="dpad-grid">
                <div></div><button class="btn-retro" id="up"><i class="fas fa-chevron-up"></i></button><div></div>
                <button class="btn-retro" id="left"><i class="fas fa-chevron-left"></i></button>
                <div class="bg-transparent"></div>
                <button class="btn-retro" id="right"><i class="fas fa-chevron-right"></i></button>
                <div></div><button class="btn-retro" id="down"><i class="fas fa-chevron-down"></i></button><div></div>
            </div>

            <div class="flex flex-col gap-4 mb-4">
                <button class="btn-retro btn-sys" id="select">Select</button>
                <button class="btn-retro btn-sys" id="start">Start</button>
            </div>

            <div class="action-btns">
                <button class="btn-retro btn-round text-red-500 border-red-900/50" id="b">B</button>
                <button class="btn-retro btn-round text-zinc-100 border-zinc-700" id="a">A</button>
            </div>
        </div>
    </div>

    <script>
        let nes;

        async function init() {
            const label = document.getElementById('loading-text');
            try {
                label.innerText = "Cargando archivo smb3.nes...";
                
                // Cargamos el emulador igual que en la web de Vercel
                nes = await Nostalgist.nes({
                    rom: 'smb3.nes',
                    element: document.querySelector('#emulator-container')
                });

                label.style.display = 'none';
                setupControls();
            } catch (err) {
                label.innerText = "Error: " + err.message;
                label.classList.remove('animate-pulse');
                label.classList.add('text-red-500');
            }
        }

        function setupControls() {
            const buttons = ['up', 'down', 'left', 'right', 'a', 'b', 'select', 'start'];
            buttons.forEach(id => {
                const el = document.getElementById(id);
                const action = 'press' + id.charAt(0).toUpperCase() + id.slice(1);
                
                const handler = (e) => {
                    e.preventDefault();
                    if (nes) nes[action]();
                };

                el.addEventListener('touchstart', handler, { passive: false });
                el.addEventListener('mousedown', handler);
            });
        }

        // Ejecutar al cargar la página
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
