<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NES Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/nostalgist"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #emulator-target { width: 100%; height: 60vh; display: flex; align-items: center; justify-content: center; background: #000; }
        canvas { width: 100% !important; height: auto !important; max-height: 100%; object-fit: contain; image-rendering: pixelated; }
        .controller { width: 100%; max-width: 450px; position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); padding: 0 20px; user-select: none; z-index: 100; }
        .btn-retro { background: #262626; border: 2px solid #3f3f46; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn-retro:active { background: #52525b; transform: scale(0.92); }
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 4px; }
        .btn-circle { width: 75px; height: 75px; border-radius: 50%; font-weight: bold; font-size: 22px; border: 4px solid #18181b; }
        .btn-sys { width: 65px; height: 28px; border-radius: 14px; font-size: 10px; font-weight: bold; background: #18181b; text-transform: uppercase; }
        #status-msg { color: #f44336; text-align: center; position: absolute; top: 10px; width: 100%; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-msg"></div>
    <div id="emulator-target"></div>

    <div class="controller flex justify-between items-end">
        <div class="dpad">
            <div></div><button class="btn-retro" id="up">▲</button><div></div>
            <button class="btn-retro" id="left">◀</button>
            <div class="bg-transparent"></div>
            <button class="btn-retro" id="right">▶</button>
            <div></div><button class="btn-retro" id="down">▼</button><div></div>
        </div>
        <div class="flex flex-col gap-4 mb-4">
            <button class="btn-retro btn-sys" id="select">Select</button>
            <button class="btn-retro btn-sys" id="start">Start</button>
        </div>
        <div class="flex gap-4">
            <button class="btn-retro btn-circle text-red-500" id="b">B</button>
            <button class="btn-retro btn-circle text-zinc-100" id="a">A</button>
        </div>
    </div>

    <script>
        async function start() {
            const status = document.getElementById('status-msg');
            const target = document.getElementById('emulator-target');

            try {
                // Obtenemos la URL actual de tu web para buscar el archivo ahí mismo
                const currentFolder = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
                const romUrl = `${window.location.origin}${currentFolder}/smb3.nes`;

                const nes = await Nostalgist.nes({
                    rom: 'smb3.nes',
                    element: target
                });

                status.innerText = ""; // Limpiamos si carga

                const buttons = ['up', 'down', 'left', 'right', 'a', 'b', 'select', 'start'];
                buttons.forEach(id => {
                    const el = document.getElementById(id);
                    const action = 'press' + id.charAt(0).toUpperCase() + id.slice(1);
                    el.onpointerdown = (e) => { e.preventDefault(); nes[action](); };
                });

            } catch (err) {
                // Si falla, mostramos el error exacto
                status.innerText = "ERROR AL CARGAR: " + err.message;
            }
        }

        window.onload = start;
    </script>
</body>
</html>
