<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NES Test</title>
    <script src="https://cdn.jsdelivr.net/npm/nostalgist"></script>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; }
        #canvas-wrapper { width: 100vw; height: 70vh; background: #000; margin-top: 10px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 300px; margin: 0 auto; }
        button { padding: 15px; background: #444; color: white; border: 1px solid #666; touch-action: none; }
        button:active { background: #888; }
    </style>
</head>
<body>
    <h3>Estado: <span id="status">Cargando...</span></h3>
    <div id="canvas-wrapper"></div>

    <div class="controls">
        <div></div><button id="up">UP</button><div></div>
        <button id="left">LEFT</button><button id="start">START</button><button id="right">RIGHT</button>
        <div></div><button id="down">DOWN</button><div></div>
        <button id="b" style="color: red;">B</button><div></div><button id="a">A</button>
    </div>

    <script>
        async function run() {
            const status = document.getElementById('status');
            try {
                status.innerText = "Buscando archivo smb3.nes...";
                
                const emu = await Nostalgist.nes('smb3.nes');
                
                status.innerText = "¡Juego Corriendo!";
                status.style.color = "#0f0";

                const btns = ['up','down','left','right','a','b','start'];
                btns.forEach(id => {
                    const el = document.getElementById(id);
                    const action = 'press' + id.charAt(0).toUpperCase() + id.slice(1);
                    el.onpointerdown = (e) => { e.preventDefault(); emu[action](); };
                });
            } catch (err) {
                status.innerText = "ERROR: " + err.message;
                status.style.color = "red";
                console.error(err);
            }
        }
        run();
    </script>
</body>
</html>
