<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Mario Bros 3 - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/nostalgist"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
        #canvas-wrapper { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; }
        canvas { width: 100% !important; height: 100% !important; object-fit: contain; image-rendering: pixelated; }
        .splash { position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: #000; transition: opacity 1s; }
        .splash img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .btn-retro { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn-retro:active { background: rgba(255,255,255,0.4); }
        .dpad-grid { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); }
        .btn-circle { width: 75px; height: 75px; border-radius: 50%; font-weight: bold; font-size: 24px; }
        .btn-rect { width: 60px; height: 60px; border-radius: 5px; }
        .btn-sys { width: 70px; height: 28px; font-size: 10px; border-radius: 14px; background: #333; }
    </style>
</head>
<body>

    <div id="splash1" class="splash"><img src="https://storage.appsrentables.com/66f1edfe82e4c204d797f55a/apps/nes/mariobros3/nintendo.jpg"></div>
    
    <div id="splash2" class="splash" style="opacity: 0; display: none;"><img src="https://storage.appsrentables.com/66f1edfe82e4c204d797f55a/apps/nes/mariobros3/supermariobros3.jpg"></div>

    <div id="game-container" style="display:none">
        <div id="canvas-wrapper"></div>
        
        <div class="absolute top-6 left-6 flex gap-2 z-30 pointer-events-auto">
            <button onclick="window.emu?.saveState('s1')" class="bg-red-600 text-white px-4 py-2 rounded text-xs font-bold shadow-lg">SAVE</button>
            <button onclick="window.emu?.loadState('s1')" class="bg-blue-600 text-white px-4 py-2 rounded text-xs font-bold ml-2 shadow-lg">LOAD</button>
        </div>

        <div class="absolute inset-0 flex flex-col justify-end p-8 pointer-events-none">
            <div class="flex justify-between items-end pointer-events-auto">
                <div class="dpad-grid">
                    <div></div><div class="btn-retro btn-rect" id="up">↑</div><div></div>
                    <div class="btn-retro btn-rect" id="left">←</div><div class="bg-transparent"></div><div class="btn-retro btn-rect" id="right">→</div>
                    <div></div><div class="btn-retro btn-rect" id="down">↓</div><div></div>
                </div>
                <div class="flex flex-col gap-4 mb-4">
                    <div class="btn-retro btn-sys" id="select">SELECT</div>
                    <div class="btn-retro btn-sys" id="start">START</div>
                </div>
                <div class="flex gap-6">
                    <div class="btn-retro btn-circle text-red-500" id="b">B</div>
                    <div class="btn-retro btn-circle text-white" id="a">A</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.emu = null;

        window.onload = () => {
            // Secuencia de imágenes (3s y 5s)
            setTimeout(() => {
                const s1 = document.getElementById('splash1');
                const s2 = document.getElementById('splash2');
                s1.style.opacity = '0';
                setTimeout(() => {
                    s1.style.display = 'none';
                    s2.style.display = 'flex';
                    setTimeout(() => s2.style.opacity = '1', 50);
                    
                    setTimeout(() => {
                        s2.style.opacity = '0';
                        setTimeout(() => {
                            s2.style.display = 'none';
                            document.getElementById('game-container').style.display = 'block';
                            initEmulator();
                        }, 1000);
                    }, 5000);
                }, 1000);
            }, 3000);
        };

        async function initEmulator() {
            try {
                // Forzamos la descarga del buffer para asegurar compatibilidad
                const response = await fetch('smb3.nes');
                if (!response.ok) throw new Error("No se pudo obtener el archivo .nes");
                const buffer = await response.arrayBuffer();

                window.emu = await Nostalgist.nes({
                    rom: { name: 'smb3.nes', data: new Uint8Array(buffer) },
                    element: document.querySelector('#canvas-wrapper')
                });

                // Configurar botones
                const keys = ['up','down','left','right','a','b','select','start'];
                keys.forEach(k => {
                    const el = document.getElementById(k);
                    const func = 'press' + k.charAt(0).toUpperCase() + k.slice(1);
                    const handler = (e) => { 
                        e.preventDefault(); 
                        if (window.emu) window.emu[func](); 
                    };
                    el.addEventListener('touchstart', handler, {passive: false});
                    el.addEventListener('mousedown', handler);
                });

                console.log("Juego cargado con éxito.");
            } catch (e) {
                console.error(e);
                alert("Error: El navegador no puede procesar el archivo. Intenta refrescar con Ctrl+F5.");
            }
        }
    </script>
</body>
</html>
